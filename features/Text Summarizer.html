<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #020617;
            --color-bg-surface: #1e293b;
            --color-bg-muted: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-muted: #94a3b8;
            --color-text-accent: #38bdf8;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-primary-active: #0284c7;
            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --radius-base: 8px;
            --radius-lg: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-base: #ffffff;
                --color-bg-elevated: #f8fafc;
                --color-bg-surface: #f1f5f9;
                --color-bg-muted: #e2e8f0;
                --color-text-primary: #0f172a;
                --color-text-secondary: #475569;
                --color-text-muted: #64748b;
                --color-text-accent: #0284c7;
                --color-primary: #0284c7;
                --color-primary-hover: #0369a1;
                --color-primary-active: #075985;
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: 1.125rem;
        }

        .input-section {
            background-color: var(--color-bg-surface);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 1rem;
            font-size: 1rem;
            font-family: var(--font-family-base);
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            border: 2px solid var(--color-bg-muted);
            border-radius: var(--radius-base);
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        textarea::placeholder {
            color: var(--color-text-muted);
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-bg-base);
            background-color: var(--color-primary);
            border: none;
            border-radius: var(--radius-base);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-left: auto;
        }

        .btn:hover {
            background-color: var(--color-primary-hover);
        }

        .btn:active {
            background-color: var(--color-primary-active);
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .char-count {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
        }

        .output-section {
            background-color: var(--color-bg-surface);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            display: none;
        }

        .output-section.visible {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--color-bg-muted);
        }

        .output-header h2 {
            font-size: 1.5rem;
            color: var(--color-text-primary);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .summary-content {
            background-color: var(--color-bg-base);
            padding: 1.5rem;
            border-radius: var(--radius-base);
            border-left: 4px solid var(--color-primary);
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .summary-content p {
            margin-bottom: 1rem;
        }

        .summary-content p:last-child {
            margin-bottom: 0;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--color-text-muted);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--color-bg-muted);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--color-text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--color-bg-muted);
            margin-top: 3rem;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .container {
                padding: 1.5rem 1rem;
            }

            .input-section, .output-section {
                padding: 1.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                margin-left: 0;
                width: 100%;
            }

            .stats {
                flex-direction: column;
                gap: 0.75rem;
            }

            .stat {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Text Summarizer</h1>
            <p class="subtitle">Extract key sentences from your text using AI-powered extractive summarization</p>
        </header>

        <div class="input-section">
            <label for="inputText">Enter Your Text</label>
            <textarea 
                id="inputText" 
                placeholder="Paste your text here... Articles, research papers, reports, or any long-form content you want to summarize."
                aria-label="Text input for summarization"
            ></textarea>
            <div class="char-count">
                <span id="charCount">0</span> characters
            </div>

            <div class="controls">
                <button class="btn" id="summarizeBtn" onclick="summarizeText()">
                    Summarize Text
                </button>
            </div>
        </div>

        <div class="output-section" id="outputSection">
            <div class="output-header">
                <h2>Summary</h2>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-value" id="originalLength">0</span>
                        <span>Original</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="summaryLength">0</span>
                        <span>Summary</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="compressionRatio">0%</span>
                        <span>Compression</span>
                    </div>
                </div>
            </div>
            <div class="summary-content" id="summaryContent"></div>
        </div>
    </div>

    <footer>
        <p>Using extractive summarization with sentence scoring algorithms</p>
    </footer>

    <script>
        const inputText = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const outputSection = document.getElementById('outputSection');
        const summaryContent = document.getElementById('summaryContent');
        const originalLengthEl = document.getElementById('originalLength');
        const summaryLengthEl = document.getElementById('summaryLength');
        const compressionRatioEl = document.getElementById('compressionRatio');

        inputText.addEventListener('input', () => {
            const count = inputText.value.length;
            charCount.textContent = count;
            summarizeBtn.disabled = count < 100;
        });

        function splitIntoSentences(text) {
            return text
                .replace(/([.!?])\s+(?=[A-Z])/g, '$1|')
                .split('|')
                .map(s => s.trim())
                .filter(s => s.length > 10);
        }

        function getWordFrequencies(sentences) {
            const words = {};
            const stopWords = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'from', 'as', 'is', 'was', 'are', 'were', 'been', 'be', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'can', 'this', 'that', 'these', 'those', 'it', 'its', 'they', 'them', 'their']);

            sentences.forEach(sentence => {
                const sentenceWords = sentence.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 2 && !stopWords.has(w));

                sentenceWords.forEach(word => {
                    words[word] = (words[word] || 0) + 1;
                });
            });

            return words;
        }

        function scoreSentences(sentences) {
            const wordFreq = getWordFrequencies(sentences);
            const maxFreq = Math.max(...Object.values(wordFreq));

            return sentences.map((sentence, index) => {
                const words = sentence.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/);

                let score = 0;
                words.forEach(word => {
                    if (wordFreq[word]) {
                        score += wordFreq[word] / maxFreq;
                    }
                });

                score = score / words.length;

                if (index < sentences.length * 0.2) {
                    score *= 1.3;
                }

                if (sentence.length > 50 && sentence.length < 200) {
                    score *= 1.1;
                }

                return { sentence, score, index };
            });
        }

        function summarizeText() {
            const text = inputText.value.trim();

            if (text.length < 100) {
                alert('Please enter at least 100 characters of text to summarize.');
                return;
            }

            summarizeBtn.disabled = true;
            summarizeBtn.textContent = 'Processing...';

            setTimeout(() => {
                const sentences = splitIntoSentences(text);

                if (sentences.length < 3) {
                    alert('Text is too short. Please provide more content with multiple sentences.');
                    summarizeBtn.disabled = false;
                    summarizeBtn.textContent = 'Summarize Text';
                    return;
                }

                const numSentences = Math.min(5, Math.ceil(sentences.length * 0.3));

                const scoredSentences = scoreSentences(sentences);
                const topSentences = scoredSentences
                    .sort((a, b) => b.score - a.score)
                    .slice(0, numSentences)
                    .sort((a, b) => a.index - b.index);

                const summary = topSentences.map(s => s.sentence).join(' ');

                summaryContent.innerHTML = `<p>${summary}</p>`;

                originalLengthEl.textContent = text.length;
                summaryLengthEl.textContent = summary.length;
                const ratio = Math.round((1 - summary.length / text.length) * 100);
                compressionRatioEl.textContent = ratio + '%';

                outputSection.classList.add('visible');

                outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                summarizeBtn.disabled = false;
                summarizeBtn.textContent = 'Summarize Text';
            }, 500);
        }

        inputText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                if (!summarizeBtn.disabled) {
                    summarizeText();
                }
            }
        });
    </script>
</body>
</html>
